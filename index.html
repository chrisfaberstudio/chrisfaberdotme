<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChristianFaber●me™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@900&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f2f2f2;
      color: #1a1a1a;
      font-family: 'Lato', sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .wordmark {
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: normal;
      text-transform: lowercase;
      color: #1a1a1a;
    }

    .wordmark .dot {
      margin: 0 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background-color: #444;
      margin: 2rem auto;
    }

    .tagline {
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    .coming-soon {
      margin-top: 3rem;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: none;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="wordmark">ChristianFaber<span class="dot">●</span><span class="studio">me™</span></h1>
    <p class="coming-soon">coming soon</p>
  </div>
</body>
</html>
